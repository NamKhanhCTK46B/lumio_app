<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;flex-direction:column;gap:14px;justify-content:center;min-height:220px}
  .row{display:flex;align-items:center;gap:18px;font-family:var(--lm-font-mono)}
  .label{font-family:var(--lm-font-sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--lm-fg-subtle);width:140px;flex:none;font-weight:600}
  .score{font-size:32px;font-weight:600;color:var(--lm-fg)}
  .delta{color:var(--lm-success);font-size:14px}
  .ipa{font-size:18px;color:var(--lm-fg-muted)}
  code{background:var(--lm-bg-muted);padding:3px 8px;border-radius:6px;font-size:13px;color:var(--lm-fg)}
</style></head><body>
  <div class="row"><span class="label">Band score</span><span class="score">6.5</span><span class="delta">+0.5</span></div>
  <div class="row"><span class="label">Phonetic IPA</span><span class="ipa">/ɪnˌtrəˈdʌktərɪ/</span></div>
  <div class="row"><span class="label">Inline code / id</span><code>vocab_words.id</code><code>CEFR B1</code></div>
</body></html>
