<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans)}
  .row{display:flex;align-items:baseline;gap:18px;padding:10px 0;border-bottom:1px solid var(--lm-border)}
  .row:last-child{border-bottom:none}
  .lbl{font-family:var(--lm-font-mono);font-size:11px;color:var(--lm-fg-muted);width:120px;flex:none}
  .sample{color:var(--lm-fg)}
  h1{margin:0;font-size:38px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
  h2{margin:0;font-size:24px;font-weight:700;letter-spacing:-.02em}
  h3{margin:0;font-size:20px;font-weight:600}
  h4{margin:0;font-size:18px;font-weight:600}
</style></head><body>
  <div class="row"><span class="lbl">h1 · 38/700</span><h1 class="sample">Học tiếng Anh, theo cách của bạn.</h1></div>
  <div class="row"><span class="lbl">h2 · 24/700</span><h2 class="sample">Hôm nay có 8 từ cần ôn</h2></div>
  <div class="row"><span class="lbl">h3 · 20/600</span><h3 class="sample">Roleplay with Sophie</h3></div>
  <div class="row"><span class="lbl">h4 · 18/600</span><h4 class="sample">Lexical resource</h4></div>
</body></html>
