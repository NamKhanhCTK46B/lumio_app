<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;flex-direction:column;gap:14px;justify-content:center;min-height:220px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--lm-font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--lm-fg-subtle);font-weight:700;width:100px;flex:none}
  .btn{font-family:var(--lm-font-sans);font-weight:600;font-size:14px;padding:10px 18px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all 180ms cubic-bezier(.2,.8,.2,1);display:inline-flex;align-items:center;gap:8px}
  .primary{background:#E8A33D;color:#1A1308;border-color:#D4912E}
  .primary:hover{background:#D4912E}
  .secondary{background:#FFFFFF;color:#0E1A2B;border-color:#E5DDD0}
  .secondary:hover{background:#F4EFE5}
  .ghost{background:transparent;color:#0E1A2B}
  .ghost:hover{background:#F0E9DA}
  .danger{background:#FBE2E2;color:#7A2424;border-color:#F5C9C9}
  .icon{width:16px;height:16px;flex:none}
  .sm{font-size:12px;padding:6px 12px;border-radius:8px}
</style></head><body>
  <div class="row"><span class="lbl">Primary</span>
    <button class="btn primary"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>Lưu vào sổ từ</button>
    <button class="btn primary sm">Save</button>
  </div>
  <div class="row"><span class="lbl">Secondary</span>
    <button class="btn secondary">Skip for now</button>
    <button class="btn ghost">Cancel</button>
  </div>
  <div class="row"><span class="lbl">Danger</span>
    <button class="btn danger">Delete deck</button>
  </div>
</body></html>
