<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;gap:14px;align-items:center;justify-content:center;min-height:200px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:64px;height:64px;background:var(--lm-primary-soft);border:1px solid var(--lm-border-strong)}
  .tok{font-family:var(--lm-font-mono);font-size:11px;color:var(--lm-fg)}
  .px{font-size:10px;color:var(--lm-fg-muted)}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="tok">xs</span><span class="px">4px</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="tok">sm</span><span class="px">8px</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><span class="tok">md</span><span class="px">12px</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="tok">lg</span><span class="px">16px</span></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><span class="tok">xl</span><span class="px">24px</span></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><span class="tok">full</span><span class="px">9999</span></div>
</body></html>
