<!doctype html><html><head><meta charset="utf-8"><title>Lumio · CEFR</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;min-height:220px}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-family:var(--lm-font-mono);font-weight:600;font-size:12px;letter-spacing:.06em;color:#fff}
  .legend{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--lm-fg-subtle);font-weight:600}
</style></head><body>
  <span class="legend">CEFR level chips · used on words, decks, characters</span>
  <div class="row">
    <span class="chip" style="background:#87C39A">A1 · Beginner</span>
    <span class="chip" style="background:#5FB283">A2 · Elementary</span>
    <span class="chip" style="background:#E8A33D;color:#1A1308">B1 · Intermediate</span>
    <span class="chip" style="background:#D98A2B">B2 · Upper-int</span>
    <span class="chip" style="background:#BD5B85">C1 · Advanced</span>
    <span class="chip" style="background:#7B3DA0">C2 · Mastery</span>
  </div>
</body></html>
