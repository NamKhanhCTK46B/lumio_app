<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row{display:flex;align-items:center;gap:12px;background:var(--lm-bg-elev-1);border:1px solid var(--lm-border);border-radius:var(--lm-radius-md);padding:12px 14px}
  .pill{padding:5px 10px;border-radius:var(--lm-radius-full);font-size:12px;font-weight:600}
  .name{font-size:13px;color:var(--lm-fg)}
  .hex{margin-left:auto;font-family:var(--lm-font-mono);font-size:11px;color:var(--lm-fg-muted)}
</style></head><body>
  <div class="row"><span class="pill" style="background:#DEF1EA;color:#135649">Mastered</span><span class="name">success</span><span class="hex">#2F9E83</span></div>
  <div class="row"><span class="pill" style="background:#FBE2E2;color:#7A2424">Error</span><span class="name">danger</span><span class="hex">#D85A5A</span></div>
  <div class="row"><span class="pill" style="background:#FBEAD0;color:#5A3608">Attention</span><span class="name">warning</span><span class="hex">#D98A2B</span></div>
  <div class="row"><span class="pill" style="background:#DEE9FA;color:#163669">Info</span><span class="name">info</span><span class="hex">#3F7BD8</span></div>
</body></html>
