<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Word popup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;justify-content:center;align-items:center;min-height:240px}
  .popup{width:340px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--lm-border);border-radius:16px;box-shadow:0 4px 16px rgba(14,26,43,.08),0 12px 32px rgba(14,26,43,.10);overflow:hidden}
  .head{display:flex;align-items:baseline;gap:10px;padding:14px 16px 6px}
  .lemma{font-size:22px;font-weight:700;color:var(--lm-fg);letter-spacing:-.01em}
  .pos{font-family:var(--lm-font-mono);font-size:11px;background:var(--lm-bg-muted);color:var(--lm-fg-muted);padding:2px 7px;border-radius:4px;letter-spacing:.04em}
  .ipa{margin-left:auto;font-family:var(--lm-font-mono);font-size:13px;color:var(--lm-fg-muted)}
  .ipa button{background:transparent;border:none;cursor:pointer;color:var(--lm-primary-press);margin-left:6px}
  .body{padding:6px 16px 12px}
  .def{font-size:14px;color:var(--lm-fg);line-height:1.5;margin-bottom:8px}
  .vi{font-size:13px;color:var(--lm-fg-muted);line-height:1.5}
  .ex{font-family:var(--lm-font-serif);font-style:italic;color:var(--lm-fg-muted);font-size:13px;padding:8px 12px;background:var(--lm-bg-muted);border-radius:8px;margin-top:8px}
  .actions{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--lm-border)}
  .btn{flex:1;font-size:12px;font-weight:600;padding:8px 10px;border-radius:8px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .save{background:#E8A33D;color:#1A1308}
  .ghost{background:transparent;color:var(--lm-fg-muted)}
  .ghost:hover{background:var(--lm-bg-hover)}
  svg{width:14px;height:14px}
</style></head><body>
  <div class="popup">
    <div class="head">
      <span class="lemma">scrutinize</span><span class="pos">v.</span>
      <span class="ipa">/ˈskruːtɪnaɪz/<button aria-label="play">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none"/></svg></button></span>
    </div>
    <div class="body">
      <div class="def">to examine something carefully and in great detail.</div>
      <div class="vi">xem xét, kiểm tra kỹ lưỡng.</div>
      <div class="ex">"The committee scrutinized the report before voting."</div>
    </div>
    <div class="actions">
      <button class="btn save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
        Lưu vào sổ từ
      </button>
      <button class="btn ghost">Thêm ví dụ</button>
    </div>
  </div>
</body></html>
