<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Vocab highlight</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--lm-bg);font-family:var(--lm-font-serif);display:flex;align-items:center;justify-content:center;min-height:200px}
  .reading{max-width:560px;font-size:18px;line-height:1.8;color:var(--lm-fg);text-wrap:pretty}
  .hl{background:rgba(232,163,61,.12);border-bottom:2px dotted #E8A33D;padding:0 1px;cursor:pointer}
  .lbl{position:absolute;top:14px;left:18px;font-family:var(--lm-font-sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--lm-fg-subtle);font-weight:700}
</style></head><body>
  <span class="lbl">Vocab highlight · above-level words</span>
  <p class="reading">The committee <span class="hl">scrutinized</span> the report and ultimately <span class="hl">conceded</span> that the proposed plan was both <span class="hl">pragmatic</span> and well-researched.</p>
</body></html>
