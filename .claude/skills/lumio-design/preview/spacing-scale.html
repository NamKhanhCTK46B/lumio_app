<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;flex-direction:column;gap:14px;justify-content:center}
  .head{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--lm-fg-subtle);font-weight:700}
  .scale{display:flex;align-items:flex-end;gap:12px}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--lm-font-mono);font-size:10px;color:var(--lm-fg-muted)}
  .bar{background:var(--lm-primary);width:18px;border-radius:3px}
  .tok{color:var(--lm-fg);font-weight:500}
</style></head><body>
  <span class="head">4-pt spacing scale</span>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><span class="tok">1</span><span>4</span></div>
    <div class="step"><div class="bar" style="height:8px"></div><span class="tok">2</span><span>8</span></div>
    <div class="step"><div class="bar" style="height:12px"></div><span class="tok">3</span><span>12</span></div>
    <div class="step"><div class="bar" style="height:16px"></div><span class="tok">4</span><span>16</span></div>
    <div class="step"><div class="bar" style="height:20px"></div><span class="tok">5</span><span>20</span></div>
    <div class="step"><div class="bar" style="height:24px"></div><span class="tok">6</span><span>24</span></div>
    <div class="step"><div class="bar" style="height:32px"></div><span class="tok">8</span><span>32</span></div>
    <div class="step"><div class="bar" style="height:40px"></div><span class="tok">10</span><span>40</span></div>
    <div class="step"><div class="bar" style="height:56px"></div><span class="tok">14</span><span>56</span></div>
    <div class="step"><div class="bar" style="height:72px"></div><span class="tok">18</span><span>72</span></div>
  </div>
</body></html>
