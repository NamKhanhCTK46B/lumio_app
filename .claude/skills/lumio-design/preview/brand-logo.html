<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Lumio · Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--lm-bg);display:flex;align-items:center;gap:28px}
  .tile{background:var(--lm-bg-elev-1);border:1px solid var(--lm-border);border-radius:var(--lm-radius-lg);padding:18px 22px;display:flex;align-items:center;gap:16px;box-shadow:var(--lm-shadow-soft)}
  .tile.dark{background:#0E1626;color:#F5EFE3;border-color:#25334D}
  .mark{width:56px;height:56px}
  .word{font-family:var(--lm-font-sans);font-weight:800;font-size:32px;letter-spacing:-1px;line-height:1}
  .dot{color:var(--lm-primary)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--lm-fg-subtle);margin-top:6px}
  .stack{display:flex;flex-direction:column;justify-content:center}
</style></head><body>
  <div class="tile">
    <img src="../assets/lumio-mark.svg" class="mark" alt="">
    <div class="stack"><span class="word">Lum<span class="dot">i</span>o</span><span class="lbl">Primary lockup · light</span></div>
  </div>
  <div class="tile dark">
    <img src="../assets/lumio-mark.svg" class="mark" alt="">
    <div class="stack"><span class="word" style="color:#F5EFE3">Lum<span class="dot" style="color:#F2B255">i</span>o</span><span class="lbl" style="color:#7C8597">Reverse · dark</span></div>
  </div>
</body></html>
