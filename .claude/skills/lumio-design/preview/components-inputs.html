<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;flex-direction:column;gap:14px;justify-content:center;min-height:220px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:12px;color:var(--lm-fg-muted);font-weight:500}
  .inp{background:#FFFFFF;border:1px solid #E5DDD0;border-radius:8px;padding:10px 12px;font-family:var(--lm-font-sans);font-size:14px;color:var(--lm-fg);width:100%;box-sizing:border-box;outline:none;transition:all 180ms cubic-bezier(.2,.8,.2,1)}
  .inp:focus,.focused{border-color:#E8A33D;box-shadow:0 0 0 3px rgba(232,163,61,.25)}
  .error{border-color:#D85A5A;box-shadow:0 0 0 3px rgba(216,90,90,.25)}
  .err{color:#7A2424;font-size:12px;margin-top:-2px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .url{display:flex;align-items:center;gap:8px;background:#FFFFFF;border:1px solid #E5DDD0;border-radius:8px;padding:8px 10px}
  .url svg{width:16px;height:16px;color:var(--lm-fg-muted);flex:none}
  .url input{border:none;outline:none;flex:1;font-family:var(--lm-font-sans);font-size:14px;background:transparent;color:var(--lm-fg)}
</style></head><body>
  <div class="grid">
    <div class="field"><label>Email</label><input class="inp focused" value="hoa.nguyen@example.com"></div>
    <div class="field"><label>Mật khẩu</label><input class="inp error" type="password" value="••••"><span class="err">Cần ít nhất 8 ký tự</span></div>
  </div>
  <div class="field"><label>Dán link YouTube / bài báo / podcast</label>
    <div class="url"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <input value="https://www.youtube.com/watch?v=…">
    </div>
  </div>
</body></html>
