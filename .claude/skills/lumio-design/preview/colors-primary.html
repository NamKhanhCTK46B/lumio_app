<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border-radius:var(--lm-radius-md);overflow:hidden;border:1px solid var(--lm-border);background:var(--lm-bg-elev-1)}
  .chip{height:74px;display:flex;align-items:flex-end;padding:10px 12px;color:#1A1308;font-weight:600;font-size:13px}
  .meta{padding:10px 12px;font-size:11px;display:flex;justify-content:space-between;color:var(--lm-fg-muted)}
  .meta b{color:var(--lm-fg);font-family:var(--lm-font-mono);font-weight:500}
</style></head><body>
  <div class="sw"><div class="chip" style="background:#FDF1DB">soft</div><div class="meta"><span>primary-soft</span><b>#FDF1DB</b></div></div>
  <div class="sw"><div class="chip" style="background:#E8A33D">primary</div><div class="meta"><span>primary</span><b>#E8A33D</b></div></div>
  <div class="sw"><div class="chip" style="background:#D4912E;color:#1A1308">hover</div><div class="meta"><span>primary-hover</span><b>#D4912E</b></div></div>
  <div class="sw"><div class="chip" style="background:#B97A20;color:#FBF9F5">press</div><div class="meta"><span>primary-press</span><b>#B97A20</b></div></div>
  <div class="sw"><div class="chip" style="background:#6A4A14;color:#FBF9F5">ink</div><div class="meta"><span>primary-ink</span><b>#6A4A14</b></div></div>
</body></html>
