<!doctype html><html><head><meta charset="utf-8"><title>Lumio · Mic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--lm-bg);font-family:var(--lm-font-sans);display:flex;gap:36px;align-items:center;justify-content:center;min-height:240px}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .mic{width:84px;height:84px;border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#FBF9F5;box-shadow:var(--lm-shadow-soft);transition:transform 90ms ease}
  .idle{background:#0E1A2B}
  .rec{background:#D85A5A;animation:pulse 1.2s var(--lm-ease) infinite}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(216,90,90,.5)}50%{transform:scale(1.04);box-shadow:0 0 0 18px rgba(216,90,90,0)}}
  svg{width:34px;height:34px}
  .lbl{font-family:var(--lm-font-mono);font-size:11px;color:var(--lm-fg);font-weight:500}
  .hint{font-size:12px;color:var(--lm-fg-muted)}
</style></head><body>
  <div class="col">
    <button class="mic idle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
    <span class="lbl">mic · idle</span><span class="hint">Nhấn giữ để ghi âm</span>
  </div>
  <div class="col">
    <button class="mic rec"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="2"/></svg></button>
    <span class="lbl">mic · recording</span><span class="hint">Đang lắng nghe… nhả để dừng</span>
  </div>
</body></html>
