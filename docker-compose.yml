# Docker Compose dev. App container kết nối tới Supabase CLI stack đang chạy
# trên host (cổng 54321). Yêu cầu: chạy `pnpm supabase:start` trước.
#
# Lệnh:
#   docker compose up app                # foreground
#   docker compose up -d app             # background
#   docker compose logs -f app           # xem log
#   docker compose down                  # tắt

services:
  app:
    container_name: lumio-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      # Override để container reach Supabase trên host
      # (host.docker.internal hoạt động tự nhiên trên Mac/Windows;
      # Linux cần extra_hosts ở dưới).
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      NODE_ENV: development
    volumes:
      # Mount source để hot reload. Đè node_modules + .next bằng volume rỗng
      # để dùng version đã cài trong image (tránh xung đột arch host vs container).
      - .:/app
      - /app/node_modules
      - /app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
